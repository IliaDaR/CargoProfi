name: cargo_app
description: Рабочий кабинет перевозчика — учёт грузоперевозок
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  cloud_functions: ^5.0.0
  firebase_storage: ^12.0.0

  # State management
  provider: ^6.1.0

  # GPS / Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Camera & Gallery
  image_picker: ^1.1.0

  # PDF viewing
  url_launcher: ^6.3.0

  # UI
  intl: ^0.19.0
  fl_chart: ^0.68.0
  google_fonts: ^6.2.0
  data_table_2: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets: []
